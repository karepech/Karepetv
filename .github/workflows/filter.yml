name: Multi-Filter M3U Scheduler

on:
  # 1. Trigger saat ada perubahan (push)
  push:
    branches:
      # Jalankan setiap kali ada push ke branch 'main'
      - main 
  
  # 2. Trigger terjadwal 
  schedule:
    # MENJALANKAN SETIAP 50 MENIT
    - cron: '*/50 * * * *'

  # Izinkan menjalankan secara manual (opsional)
  workflow_dispatch:

jobs:
  filter_m3u:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies (requests)
        run: pip install requests

      - name: Jalankan Skrip Multi-Filter
        # Skrip ini menghasilkan file M3U dan file TXT laporan EPG
        run: python download_m3u.py
        
      # --- LANGKAH PENTING UNTUK COMMIT/PUSH ---
      - name: Konfigurasi Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit dan Push file M3U dan TXT yang Diperbarui
        run: |
          # Perbaikan: Menggunakan *.m3u dan *.txt agar playlist DAN laporan EPG ikut terdeteksi
          git add *.m3u *.txt
          
          # Melakukan commit hanya jika ada perubahan.
          git commit -m "Otomatis: Update playlist M3U & Daftar EPG Sports" || echo "Tidak ada perubahan untuk di-commit"
          
          # Melakukan push.
          git push
